name: IndexNow ping

# Daily: submit the live sitemap to IndexNow (Bing, Yandex, Seznam, Naver) so
# newly deployed pages get crawled fast. Google discovers them via the sitemap
# in robots.txt + Search Console.
on:
  schedule:
    - cron: "0 15 * * *"   # daily 15:00 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  SITE_URL: ${{ vars.SITE_URL || 'https://invoicesnap.app' }}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Submit sitemap URLs to IndexNow
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: node scripts/ping-index.mjs --site "${SITE_URL}"
