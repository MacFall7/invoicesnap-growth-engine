name: Grow InvoiceSnap SEO

# Weekly: generate the next batch of profession pages and open a PR against the
# InvoiceSnap repo. Merge the PR → Vercel auto-deploys → new pages go live.
on:
  schedule:
    - cron: "0 13 * * 1"   # Mondays 13:00 UTC
  workflow_dispatch:
    inputs:
      batch_size:
        description: "How many new pages to add this run"
        required: false
        default: "12"

permissions:
  contents: read

env:
  SITE_URL: ${{ vars.SITE_URL || 'https://invoicesnap.app' }}
  BATCH_SIZE: ${{ github.event.inputs.batch_size || vars.BATCH_SIZE || '12' }}
  # Target repo the engine ships pages into. Override with a repo variable if needed.
  TARGET_REPO: ${{ vars.TARGET_REPO || 'MacFall7/invoicesnap' }}

jobs:
  grow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout engine
        uses: actions/checkout@v4

      - name: Checkout InvoiceSnap (target)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          token: ${{ secrets.GH_PAT }}
          path: invoicesnap
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate next batch into InvoiceSnap
        run: |
          node --experimental-strip-types scripts/generate.mjs \
            --source invoicesnap/lib/professions.ts \
            --write \
            --batch "${BATCH_SIZE}" \
            --site "${SITE_URL}"

      - name: Open pull request to InvoiceSnap
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT }}
          path: invoicesnap
          add-paths: lib/professions.ts
          branch: growth-engine/seo-batch
          base: main
          delete-branch: true
          commit-message: "SEO: add profession invoice-template pages (growth engine)"
          title: "SEO: new profession invoice-template pages"
          body-path: out/report.md
          labels: seo, automated
